version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jupiter
      POSTGRES_PASSWORD: jupiter
      POSTGRES_DB: jupiter
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports: ['5432:5432']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jupiter']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      NODE_ENV: production
      API_PORT: 4000
      JUPITER_BASE_URL: https://lite-api.jup.ag
      DATABASE_URL: postgres://jupiter:jupiter@postgres:5432/jupiter
      REDIS_URL: redis://redis:6379
    ports: ['4000:4000']
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      NEXT_PUBLIC_GRAPHQL_URL: http://localhost:4000/graphql
    ports: ['3000:3000']
    depends_on: [api]

volumes:
  pgdata:

